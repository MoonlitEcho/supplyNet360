name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Prepare requirements for current Python
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          req = Path("requirements.txt")
          raw = req.read_bytes()
          text = ""
          for enc in ("utf-16", "utf-8"):
              try:
                  text = raw.decode(enc)
                  break
              except UnicodeDecodeError:
                  continue
          if not text:
              raise RuntimeError("Unable to decode requirements.txt")

          py = sys.version_info
          if py < (3, 11):
              text = text.replace("contourpy==1.3.3", "contourpy==1.3.2")
          if py < (3, 10):
              text = text.replace("scikit-learn==1.7.2", "scikit-learn==1.5.2")
              text = text.replace("numba==0.62.1", "numba==0.60.0")
              text = text.replace("llvmlite==0.45.1", "llvmlite==0.43.0")

          Path("requirements-ci.txt").write_text(text, encoding="utf-8")
          print("Generated requirements-ci.txt")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install pytest pytest-cov black pylint bandit coverage-badge

      - name: Dependency health check
        run: python -m pip check

      - name: Lint with black
        run: black --check tests

      - name: Lint with pylint
        run: pylint --disable=all --enable=E,F Deploy/api.py Deploy/app.py tests

      - name: Security checks (bandit)
        run: bandit -r Deploy --severity-level high --confidence-level high -f json -o bandit-report.json

      - name: Run unit tests with coverage
        run: |
          if [ -d "tests" ] && find tests -type f -name "test_*.py" | grep -q .; then
            python -m pytest -q --junitxml=test-results.xml --cov=Deploy --cov-report=xml --cov-report=term-missing
          else
            echo "No unit tests found."
          fi

      - name: Generate test summary
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])
          result = Path("test-results.xml")
          if result.exists():
              root = ET.parse(result).getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              tests = int(suite.attrib.get("tests", 0))
              failures = int(suite.attrib.get("failures", 0))
              errors = int(suite.attrib.get("errors", 0))
              skipped = int(suite.attrib.get("skipped", 0))
              summary_file.write_text(
                  f"### Test Summary\\n- Tests: {tests}\\n- Failures: {failures}\\n- Errors: {errors}\\n- Skipped: {skipped}\\n",
                  encoding="utf-8",
              )
          else:
              summary_file.write_text("### Test Summary\\nNo test report was generated.\\n", encoding="utf-8")
          PY

      - name: Generate coverage badge
        if: always()
        run: |
          if [ -f .coverage ]; then
            coverage-badge -o coverage-badge.svg -f
          fi

      - name: Validate model training artifacts/scripts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          train_dir = Path("Train")
          py_scripts = sorted(train_dir.glob("*.py"))
          notebooks = sorted(train_dir.glob("*.ipynb"))

          if py_scripts:
              for script in py_scripts:
                  compile(script.read_text(encoding="utf-8"), str(script), "exec")
              print(f"Validated {len(py_scripts)} training script(s).")
          elif notebooks:
              for nb in notebooks:
                  data = json.loads(nb.read_text(encoding="utf-8"))
                  if "cells" not in data:
                      raise ValueError(f"Notebook missing cells: {nb}")
              print(f"Validated {len(notebooks)} training notebook(s).")
          else:
              raise FileNotFoundError("No training script or notebook found in Train/")
          PY

      - name: Test FastAPI endpoints
        run: python -m pytest -q tests/test_api_health.py

      - name: Upload test and security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-py${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml
            coverage-badge.svg
            bandit-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Failure notification
        if: failure()
        run: |
          echo "::error::CI pipeline failed for Python ${{ matrix.python-version }} on ${{ github.ref }}"
          echo "### 🚨 CI Failure Notification" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: ${{ github.workflow }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: ${{ github.ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python: ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"

  nightly-regression-marker:
    if: github.event_name == 'schedule'
    needs: quality-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Nightly regression summary
        run: |
          echo "### 🌙 Nightly regression run completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
