name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Normalize requirements encoding
        run: |
          python - <<'PY'
          from pathlib import Path

          requirements = Path("requirements.txt")
          requirements.write_text(requirements.read_text(encoding="utf-16"), encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Dependency health check
        run: python -m pip check

      - name: Basic validation
        run: python -m compileall Deploy Preprocessing Train

      - name: Run tests (if available)
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            python -m pip install pytest
            python -m pytest -q
          else
            echo "No tests found; skipping pytest."
          fi
